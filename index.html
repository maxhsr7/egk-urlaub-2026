<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EGK Urlaub 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <img src="egk-header.jpg" alt="EGK Urlaub 2026 Header" style="width:100%; border-bottom: 3px solid #514a9d;">
  </header>

  <main id="app">
    <section id="login">
      <h2>Wer bist du?</h2>
      <div id="userButtons"></div>
    </section>

    <section id="dashboard" class="hidden">
      <nav>
        <button class="tab active" data-tab="kosten">Kosten</button>
        <button class="tab" data-tab="budget">Budget</button>
        <button class="tab" data-tab="termine">Termine</button>
      </nav>

      <h2 id="usernameDisplay"></h2>
      <div id="tabContent"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
